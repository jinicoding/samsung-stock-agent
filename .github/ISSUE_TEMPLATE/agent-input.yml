name: "에이전트에게 요청"
description: "싸나이 에이전트에게 기능 추가, 분석 개선 등을 요청합니다."
labels: ["agent-input"]
body:
  - type: textarea
    id: request
    attributes:
      label: "요청 내용"
      description: "에이전트에게 무엇을 해달라고 요청하시나요? 구체적일수록 좋습니다."
      placeholder: "예: 볼린저 밴드 지표를 기술적 분석에 추가해주세요"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "배경/맥락 (선택)"
      description: "왜 이 기능이 필요한지, 어떤 상황에서 유용한지 설명해주세요."
      placeholder: "예: 변동성이 큰 구간에서 매매 타이밍을 잡기 어려워서"
    validations:
      required: false
